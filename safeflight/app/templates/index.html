<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Weather</title>
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="/static/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/static/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/static/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/static/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/static/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/static/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-icon-180x180.png">

    <!-- Android and Favicon Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/static/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">

    <!-- Manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Microsoft Meta Tags -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/static/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #007BFF, #f4f4f9);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
            text-align: center;
        }

        /* Header Section */
        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            color: #007BFF;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1rem;
            color: #555;
        }

        /* Form Section */
        .form-card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        label {
            font-size: 1rem;
            color: #555;
            width: 100%;
            text-align: left;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            font-size: 1rem;
            color: #fff;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        /* Footer Section */
        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none; /* Initially hidden */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white */
            backdrop-filter: blur(5px); /* Adds a blur effect to the background */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Spinner */
        .spinner {
            border: 6px solid #f3f3f3; /* Light gray */
            border-top: 6px solid #007BFF; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* Spinner Animation */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>Drone Weather [M30T]</h1>
            <p>Prüfen Sie die Wetterbedingungen für Ihre Drohnenflüge mit präzisen Daten in Echtzeit. Optimierte Auswertung für die DJI Matrice 30.</p>
        </div>

        <!-- Form Section -->
        <div class="form-card">
            <form action="/results" method="post" onsubmit="showLoading(event)">
                <label for="address">Adresse eingeben:</label>
                <input type="text" id="address" name="address" required autofocus>
                <button type="submit">Prüfen</button>
            </form>
        </div>

        <!-- Footer Section -->
        <footer>
            <p>&copy; 2025 Drone Weather. Powered by accurate geophysical data. 
                <a href="mailto:drone-weather@oz-security.io" style="color: #007BFF; text-decoration: none;">drone-weather@oz-security.io</a> - v1.3</p>
        </footer>
    </div>

    <script>
        function showLoading(event) {
            // Prevent the form from being immediately submitted
            event.preventDefault();

            // Show the loading overlay
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';

            // Submit the form after showing the loading overlay
            const form = event.target;
            setTimeout(() => form.submit(), 100); // Slight delay to display the spinner
        }
    </script>
</body>
</html>
