# Drop requests that don't match a known hostname
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

upstream drohnenwetter {
    server drohnenwetter-app:8080;
}

# Global per-IP limit for the results endpoint. Lives in the single nginx
# instance, so it holds across all app replicas (unlike the in-process Go
# limiter). Keyed on the real client IP from Cloudflare. 10 req/min, burst 10.
limit_req_zone $http_cf_connecting_ip zone=results:10m rate=10r/m;

log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

server {
    listen 80;
    server_name drohnenwetter.de;
    server_name www.drohnenwetter.de;
    server_name localhost;

    gzip on;
    gzip_types text/html text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # Proxy headers at server scope so every location inherits them.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header CF-Ray $http_cf_ray;
    proxy_set_header CF-Visitor $http_cf_visitor;

    # rate limited globally.
    location = /results {
        limit_req zone=results burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://drohnenwetter;
    }

    location / {
        proxy_pass http://drohnenwetter;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log cloudflare;
}
