{{define "head"}}
<!DOCTYPE html>
<html lang="de" data-lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drone Weather · DJI M30T</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-icon-180x180.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0d1117">

  <!-- Prevent flash of wrong theme -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Dark mode (default) ── */
    :root {
      --bg:       #0d1117;
      --surface:  rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.08);
      --border:   rgba(255,255,255,0.10);
      --ok:       #00d4ff;
      --warn:     #ff4757;
      --amber:    #ffa502;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,.4);
    }

    /* ── Light mode override ── */
    html[data-theme="light"] {
      --bg:       #f0f4f8;
      --surface:  rgba(255,255,255,0.75);
      --surface2: rgba(255,255,255,0.9);
      --border:   rgba(0,0,0,0.10);
      --ok:       #0088aa;
      --warn:     #d63040;
      --amber:    #c07000;
      --text:     #1c2128;
      --muted:    #57606a;
      --shadow:   0 4px 24px rgba(0,0,0,.12);
    }
    html[data-theme="light"] body {
      background: var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    a { color: var(--ok); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.25rem;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .badge-ok   { background: rgba(0,212,255,.12); color: var(--ok); border: 1px solid rgba(0,212,255,.3); }
    .badge-warn { background: rgba(255,71,87,.12);  color: var(--warn); border: 1px solid rgba(255,71,87,.3); }

    /* ── Controls row (lang + theme) ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .lang-toggle {
      display: flex; gap: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
    }
    .lang-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .lang-btn.active { background: var(--surface2); color: var(--text); }

    .theme-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      cursor: pointer;
      font-size: 16px;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .theme-btn:hover { opacity: .8; }

    /* ── i18n visibility ── */
    html[data-lang="de"] [data-en] { display: none; }
    html[data-lang="en"] [data-de] { display: none; }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: .85rem 1.25rem;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .site-footer a { color: var(--muted); }
    .site-footer a:hover { color: var(--ok); text-decoration: none; }
    .footer-apis {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem .75rem;
      justify-content: center;
      margin-top: .35rem;
    }
    .footer-apis span::before { content: '·'; margin-right: .75rem; }
    .footer-apis span:first-child::before { content: ''; margin-right: 0; }
  </style>
</head>
<body>
{{end}}

{{define "uiscript"}}
<script>
/* ── Language ── */
(function() {
  var l = localStorage.getItem('lang') || 'de';
  document.documentElement.setAttribute('data-lang', l);
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.l === l);
  });
})();

function setLang(l) {
  document.documentElement.setAttribute('data-lang', l);
  localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.l === l);
  });
}

/* ── Theme ── */
(function() {
  var t = localStorage.getItem('theme') || 'dark';
  var btn = document.querySelector('.theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelectorAll('.theme-btn').forEach(function(b) {
    b.textContent = next === 'dark' ? '☀️' : '🌙';
  });
}
</script>
{{end}}

</html>
