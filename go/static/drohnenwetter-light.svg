<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Base gradient — clean light sky -->
    <linearGradient id="bgGradLight" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="45%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>

    <!-- Radial glow for focal point -->
    <radialGradient id="centerGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="topLeftGlowL" cx="20%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="bottomRightGlowL" cx="85%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlowL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradLight)"/>
  <rect width="1920" height="1080" fill="url(#centerGlowL)"/>
  <rect width="1920" height="1080" fill="url(#topLeftGlowL)"/>
  <rect width="1920" height="1080" fill="url(#bottomRightGlowL)"/>

  <!-- === PERSPECTIVE GRID === -->
  <g opacity="0.12" stroke="#0284c7" stroke-width="0.5" fill="none">
    <line x1="960" y1="540" x2="0" y2="200"/>
    <line x1="960" y1="540" x2="0" y2="300"/>
    <line x1="960" y1="540" x2="0" y2="400"/>
    <line x1="960" y1="540" x2="0" y2="500"/>
    <line x1="960" y1="540" x2="0" y2="600"/>
    <line x1="960" y1="540" x2="0" y2="700"/>
    <line x1="960" y1="540" x2="0" y2="800"/>
    <line x1="960" y1="540" x2="0" y2="900"/>
    <line x1="960" y1="540" x2="1920" y2="200"/>
    <line x1="960" y1="540" x2="1920" y2="300"/>
    <line x1="960" y1="540" x2="1920" y2="400"/>
    <line x1="960" y1="540" x2="1920" y2="500"/>
    <line x1="960" y1="540" x2="1920" y2="600"/>
    <line x1="960" y1="540" x2="1920" y2="700"/>
    <line x1="960" y1="540" x2="1920" y2="800"/>
    <line x1="960" y1="540" x2="1920" y2="900"/>
    <line x1="960" y1="540" x2="200" y2="0"/>
    <line x1="960" y1="540" x2="450" y2="0"/>
    <line x1="960" y1="540" x2="700" y2="0"/>
    <line x1="960" y1="540" x2="960" y2="0"/>
    <line x1="960" y1="540" x2="1220" y2="0"/>
    <line x1="960" y1="540" x2="1470" y2="0"/>
    <line x1="960" y1="540" x2="1720" y2="0"/>
    <line x1="960" y1="540" x2="200" y2="1080"/>
    <line x1="960" y1="540" x2="450" y2="1080"/>
    <line x1="960" y1="540" x2="700" y2="1080"/>
    <line x1="960" y1="540" x2="960" y2="1080"/>
    <line x1="960" y1="540" x2="1220" y2="1080"/>
    <line x1="960" y1="540" x2="1470" y2="1080"/>
    <line x1="960" y1="540" x2="1720" y2="1080"/>
  </g>

  <!-- Concentric circles from center -->
  <g opacity="0.08" stroke="#0284c7" stroke-width="0.7" fill="none">
    <circle cx="960" cy="540" r="120"/>
    <circle cx="960" cy="540" r="240"/>
    <circle cx="960" cy="540" r="380"/>
    <circle cx="960" cy="540" r="530"/>
    <circle cx="960" cy="540" r="700"/>
    <circle cx="960" cy="540" r="900"/>
  </g>

  <!-- Subtle cloud-like shapes for sky atmosphere -->
  <g opacity="0.18" fill="white">
    <ellipse cx="300" cy="120" rx="200" ry="35"/>
    <ellipse cx="350" cy="108" rx="150" ry="30"/>
    <ellipse cx="1550" cy="200" rx="180" ry="28"/>
    <ellipse cx="1600" cy="188" rx="130" ry="25"/>
    <ellipse cx="800" cy="80" rx="120" ry="22"/>
    <ellipse cx="1200" cy="950" rx="160" ry="28"/>
  </g>

  <!-- === DRONE SILHOUETTES === -->
  <!-- Main large drone — upper area -->
  <g filter="url(#softGlowL)" opacity="0.3" transform="translate(350, 200) scale(2.2) rotate(-8)">
    <rect x="-14" y="-5" width="28" height="10" rx="3" fill="#0284c7"/>
    <line x1="-14" y1="-4" x2="-34" y2="-22" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="14" y1="-4" x2="34" y2="-22" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="-14" y1="4" x2="-34" y2="24" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="14" y1="4" x2="34" y2="24" stroke="#0284c7" stroke-width="2.5"/>
    <ellipse cx="-34" cy="-22" rx="14" ry="4" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="34" cy="-22" rx="14" ry="4" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="-34" cy="24" rx="14" ry="4" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="34" cy="24" rx="14" ry="4" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#0ea5e9"/>
    <line x1="0" y1="5" x2="0" y2="12" stroke="#0284c7" stroke-width="1.5"/>
    <circle cx="0" cy="14" r="4" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  </g>

  <!-- Medium drone — right mid -->
  <g filter="url(#softGlowL)" opacity="0.22" transform="translate(1580, 300) scale(1.6) rotate(10)">
    <rect x="-14" y="-5" width="28" height="10" rx="3" fill="#0369a1"/>
    <line x1="-14" y1="-4" x2="-34" y2="-22" stroke="#0369a1" stroke-width="2.5"/>
    <line x1="14" y1="-4" x2="34" y2="-22" stroke="#0369a1" stroke-width="2.5"/>
    <line x1="-14" y1="4" x2="-34" y2="24" stroke="#0369a1" stroke-width="2.5"/>
    <line x1="14" y1="4" x2="34" y2="24" stroke="#0369a1" stroke-width="2.5"/>
    <ellipse cx="-34" cy="-22" rx="14" ry="4" fill="none" stroke="#0369a1" stroke-width="1.5"/>
    <ellipse cx="34" cy="-22" rx="14" ry="4" fill="none" stroke="#0369a1" stroke-width="1.5"/>
    <ellipse cx="-34" cy="24" rx="14" ry="4" fill="none" stroke="#0369a1" stroke-width="1.5"/>
    <ellipse cx="34" cy="24" rx="14" ry="4" fill="none" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#38bdf8"/>
    <line x1="0" y1="5" x2="0" y2="12" stroke="#0369a1" stroke-width="1.5"/>
    <circle cx="0" cy="14" r="4" fill="none" stroke="#0369a1" stroke-width="1.5"/>
  </g>

  <!-- Small drone bottom-left -->
  <g opacity="0.15" transform="translate(180, 850) scale(0.9) rotate(5)">
    <rect x="-14" y="-5" width="28" height="10" rx="3" fill="#0ea5e9"/>
    <line x1="-14" y1="-4" x2="-34" y2="-22" stroke="#0ea5e9" stroke-width="2.5"/>
    <line x1="14" y1="-4" x2="34" y2="-22" stroke="#0ea5e9" stroke-width="2.5"/>
    <line x1="-14" y1="4" x2="-34" y2="24" stroke="#0ea5e9" stroke-width="2.5"/>
    <line x1="14" y1="4" x2="34" y2="24" stroke="#0ea5e9" stroke-width="2.5"/>
    <ellipse cx="-34" cy="-22" rx="14" ry="4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <ellipse cx="34" cy="-22" rx="14" ry="4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <ellipse cx="-34" cy="24" rx="14" ry="4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <ellipse cx="34" cy="24" rx="14" ry="4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#38bdf8"/>
  </g>

  <!-- === FLIGHT PATHS === -->
  <g opacity="0.25" fill="none" stroke="#0284c7" stroke-dasharray="6 10">
    <path d="M 350 200 Q 550 350 750 460" stroke-width="1.2"/>
    <path d="M 960 540 Q 1200 580 1460 680" stroke-width="1.2"/>
    <path d="M 1580 300 Q 1540 480 1460 680" stroke-width="1"/>
    <path d="M 80 100 Q 400 180 750 170 Q 1100 160 1400 100" stroke-width="0.8" stroke-dasharray="4 14"/>
  </g>

  <!-- Altitude drop lines -->
  <g opacity="0.12" stroke="#0284c7" stroke-width="0.8" stroke-dasharray="3 8" fill="none">
    <line x1="350" y1="200" x2="350" y2="540"/>
    <line x1="1580" y1="300" x2="1580" y2="540"/>
    <line x1="180" y1="850" x2="180" y2="540"/>
  </g>

  <!-- Crosshair at center -->
  <g opacity="0.15" stroke="#0284c7" stroke-width="1" fill="none" transform="translate(960,540)">
    <circle r="20"/>
    <circle r="40"/>
    <line x1="-55" y1="0" x2="-22" y2="0"/>
    <line x1="22" y1="0" x2="55" y2="0"/>
    <line x1="0" y1="-55" x2="0" y2="-22"/>
    <line x1="0" y1="22" x2="0" y2="55"/>
    <path d="M -50 -50 L -50 -35 M -50 -50 L -35 -50" stroke-width="1.5"/>
    <path d="M 50 -50 L 50 -35 M 50 -50 L 35 -50" stroke-width="1.5"/>
    <path d="M -50 50 L -50 35 M -50 50 L -35 50" stroke-width="1.5"/>
    <path d="M 50 50 L 50 35 M 50 50 L 35 50" stroke-width="1.5"/>
  </g>

  <!-- Waypoint dots -->
  <g opacity="0.4" fill="#0284c7">
    <circle cx="350" cy="200" r="3"/>
    <circle cx="1580" cy="300" r="3"/>
    <circle cx="180" cy="850" r="2.5"/>
    <circle cx="960" cy="540" r="2"/>
    <circle cx="550" cy="350" r="1.5"/>
    <circle cx="750" cy="460" r="1.5"/>
    <circle cx="1200" cy="580" r="1.5"/>
    <circle cx="1460" cy="680" r="1.5"/>
  </g>

  <!-- Corner brackets -->
  <g opacity="0.18" stroke="#0284c7" stroke-width="1.2" fill="none">
    <path d="M 30 30 L 30 80 M 30 30 L 80 30"/>
    <path d="M 1890 30 L 1890 80 M 1890 30 L 1840 30"/>
    <path d="M 30 1050 L 30 1000 M 30 1050 L 80 1050"/>
    <path d="M 1890 1050 L 1890 1000 M 1890 1050 L 1840 1050"/>
  </g>

  <!-- Bottom horizon ground-grid lines (subtle) -->
  <g opacity="0.07" stroke="#0369a1" stroke-width="0.5" fill="none">
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="950" x2="1920" y2="950"/>
    <line x1="0" y1="1000" x2="1920" y2="1000"/>
    <line x1="0" y1="1050" x2="1920" y2="1050"/>
  </g>
</svg>
