# Drop requests that don't match a known hostname
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

upstream drohnenwetter {
    server drohnenwetter-app:8080;
}

log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

server {
    listen 80;
    server_name drohnenwetter.de;
    server_name www.drohnenwetter.de;
    server_name localhost;

    gzip on;
    gzip_types text/html text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    gzip_vary on;

    location / {
        proxy_pass http://drohnenwetter;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log cloudflare;
}
