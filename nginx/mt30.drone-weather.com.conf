# Default server block to drop requests that don't match a known domain
# server {
#     listen 80 default_server;
#     server_name _;

#     return 444; # close connection immediately, no response
# }

upstream app_servers {
        server safeflight-app:8080;
    }

log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

server {
    listen 80;
    server_name drohnenwetter.de;
    server_name www.drohnenwetter.de;
    server_name localhost;

    location / {
        proxy_pass http://app_servers;

        # Preserve the original client IP and headers from Cloudflare
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional: Pass Cloudflare headers to the application
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log cloudflare;
}
